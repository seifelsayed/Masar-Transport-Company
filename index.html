<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASAR - تسجيل الدخول</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-[#0f0f1a] overflow-hidden">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="floating-shape w-64 h-64 top-10 -right-20"></div>
    <div class="floating-shape w-96 h-96 -bottom-20 -left-20"></div>
    <div class="floating-shape w-48 h-48 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-5"></div>
  </div>

  <div class="min-h-screen flex items-center justify-center p-6 relative z-10">
    <div id="login-card" class="w-full max-w-[420px] bg-white/5 backdrop-blur-xl rounded-[32px] border border-white/10 p-8 shadow-2xl transition-all duration-500 scale-100 opacity-100">
      <div class="text-center mb-10">
        <div class="w-20 h-20 mx-auto mb-6 rounded-[24px] overflow-hidden ring-4 ring-white/10 shadow-2xl">
          <img id="logo" src="assets/logo.jpeg" alt="MASAR" class="w-full h-full object-cover">
        </div>
        <h1 class="text-3xl font-black text-white mb-2 tracking-tight">أهلاً بك في <span class="bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">MASAR</span></h1>
        <p class="text-white/40 text-sm font-medium">سجل دخولك لإدارة شحناتك بذكاء</p>
      </div>

      <form id="login-form" class="space-y-5">
        <div class="space-y-1">
          <label class="text-white/60 text-xs font-medium">كود الشركة</label>
          <div class="relative">
            <i class="bi bi-hash absolute top-1/2 -translate-y-1/2 right-3 text-white/30 text-sm"></i>
            <input type="text" id="code" required placeholder="مثال: MASAR01" class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pr-9 pl-4 text-white text-sm placeholder-white/20 outline-none focus:border-blue-500/60 transition-all duration-200">
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-white/60 text-xs font-medium">اسم المستخدم</label>
          <div class="relative">
            <i class="bi bi-person absolute top-1/2 -translate-y-1/2 right-3 text-white/30 text-sm"></i>
            <input type="text" id="username" required placeholder="أدخل اسم المستخدم" class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pr-9 pl-4 text-white text-sm placeholder-white/20 outline-none focus:border-blue-500/60 transition-all duration-200">
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-white/60 text-xs font-medium">كلمة المرور</label>
          <div class="relative">
            <i class="bi bi-shield-lock absolute top-1/2 -translate-y-1/2 right-3 text-white/30 text-sm"></i>
            <input type="password" id="password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pr-9 pl-4 text-white text-sm placeholder-white/20 outline-none focus:border-blue-500/60 transition-all duration-200">
            <button type="button" id="toggle-pass" class="absolute top-1/2 -translate-y-1/2 left-3 text-white/30 hover:text-white/70 transition-colors text-sm">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div id="error-msg" class="text-red-400 text-xs font-medium text-center hidden"></div>

        <button type="submit" id="login-btn" class="relative w-full text-white font-bold py-3 rounded-xl text-sm overflow-hidden transition-all duration-200 hover:opacity-90 hover:scale-[1.01] active:scale-[0.99] bg-gradient-to-r from-blue-600 to-purple-600 shadow-lg shadow-blue-600/30">
          <span class="flex items-center justify-center gap-2">
            <span>دخول للنظام</span>
            <i class="bi bi-arrow-left-short text-lg"></i>
          </span>
        </button>
      </form>

      <div class="mt-8 pt-8 border-t border-white/5 text-center">
        <button id="show-register" class="text-white/40 hover:text-white text-xs font-medium transition-colors">ليس لديك حساب؟ <span class="text-blue-400">سجل شركتك الآن</span></button>
      </div>
    </div>

    <div id="register-card" class="hidden w-full max-w-[420px] bg-white/5 backdrop-blur-xl rounded-[32px] border border-white/10 p-8 shadow-2xl transition-all duration-500">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-white mb-2">تسجيل شركة جديدة</h2>
        <p class="text-white/40 text-xs font-medium mb-6">انضم إلى منصة MASAR ووسع أعمالك</p>
        
        <div class="bg-blue-500/10 border border-blue-500/20 rounded-2xl p-4 text-right flex items-start gap-3">
          <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center flex-shrink-0">
            <i class="bi bi-gift text-blue-400"></i>
          </div>
          <div>
            <p class="text-blue-400 text-xs font-bold">فترة تجريبية مجانية لمدة 7 أيام!</p>
            <p class="text-white/50 text-[10px] leading-relaxed mt-1">احصل على وصول كامل لجميع أدوات إدارة الشحنات، المندوبين، والتقارير. لا يلزم وجود بطاقة ائتمان.</p>
          </div>
        </div>
      </div>
      <form id="register-form" class="space-y-4">
        <div class="space-y-1">
          <label class="text-white/60 text-[10px] font-medium uppercase tracking-wider">اسم الشركة</label>
          <div class="relative">
            <i class="bi bi-building absolute top-1/2 -translate-y-1/2 right-3 text-white/30 text-sm"></i>
            <input type="text" id="reg-company" required placeholder="اسم شركتك" class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pr-9 pl-4 text-white text-sm placeholder-white/20 outline-none focus:border-blue-500/60 transition-all duration-200">
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-white/60 text-[10px] font-medium uppercase tracking-wider">اسم المستخدم للمدير</label>
          <div class="relative">
            <i class="bi bi-person absolute top-1/2 -translate-y-1/2 right-3 text-white/30 text-sm"></i>
            <input type="text" id="reg-username" required placeholder="admin" class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pr-9 pl-4 text-white text-sm placeholder-white/20 outline-none focus:border-blue-500/60 transition-all duration-200">
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-white/60 text-[10px] font-medium uppercase tracking-wider">رقم الهاتف</label>
          <div class="relative">
            <i class="bi bi-phone absolute top-1/2 -translate-y-1/2 right-3 text-white/30 text-sm"></i>
            <input type="tel" id="reg-phone" required placeholder="01xxxxxxxxx" class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pr-9 pl-4 text-white text-sm placeholder-white/20 outline-none focus:border-blue-500/60 transition-all duration-200">
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-white/60 text-[10px] font-medium uppercase tracking-wider">كلمة المرور</label>
          <div class="relative">
            <i class="bi bi-lock absolute top-1/2 -translate-y-1/2 right-3 text-white/30 text-sm"></i>
            <input type="password" id="reg-password" required placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pr-9 pl-4 text-white text-sm placeholder-white/20 outline-none focus:border-blue-500/60 transition-all duration-200">
          </div>
        </div>
        <button type="submit" class="w-full text-white font-bold py-3 rounded-xl text-sm bg-gradient-to-r from-green-600 to-teal-600 shadow-lg shadow-green-600/30 hover:opacity-90 transition-all mt-4">إنشاء الحساب</button>
      </form>
      <div class="mt-6 text-center">
        <button id="show-login" class="text-white/40 hover:text-white text-xs font-medium transition-colors">لديك حساب بالفعل؟ <span class="text-blue-400">سجل دخولك</span></button>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/login.js"></script>
</body>
</html>
